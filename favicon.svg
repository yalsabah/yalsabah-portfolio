<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151521"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Gradient ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#g)" stroke-width="2"/>
  <!-- YA text -->
  <text x="32" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-weight="800" font-size="22" fill="url(#g)">YA</text>
</svg>
