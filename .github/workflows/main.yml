name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js

      - name: List repository files
        run: ls -la
